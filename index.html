<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Frontend Mentor Challenge solution" />
    <title>The Odin Project | Challenge Name</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/image/favicon-32x32.png"
    />
  </head>
  <body>
    <main>
  <div class="container">
    <section id="display">Display</section>
    <section class="functions">
      <button>Delete</button>
      <button>Clear</button>
      <button>%</button>
      <button>/</button>
    </section>
    <section class="functions">
      <button value="7" class="digits">7</button>
      <button value="8" class="digits">8</button>
      <button value="9" class="digits">9</button>
      <button>X</button>
    </section>
    <section class="functions">
      <button value="4" class="digits">4</button>
      <button value="5" class="digits">5</button>
      <button value="6" class="digits">6</button>
      <button>-</button>
    </section>
    <section class="functions">
      <button value="1" class="digits">1</button>
      <button value="2" class="digits">2</button>
      <button value="3" class="digits">3</button>
      <button>+</button>
    </section>
    <section class="functions">
      <button>+/-</button>
      <button value="0" class="digits">0</button>
      <button>.</button>
      <button>=</button>
    </section>
  </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
